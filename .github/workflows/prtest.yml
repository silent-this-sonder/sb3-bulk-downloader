name: GUI Screenshot Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  screenshot:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            os_name: linux
            exe_ext: ""
            nuitka_mode: "--onefile"
            run_cmd: "./sb3-bulk-downloader-linux"
            artifact_path: "sb3-bulk-downloader-linux"
            icon_arg: "--linux-icon=assets/icon.png"
          - os: windows-latest
            os_name: windows
            exe_ext: ".exe"
            nuitka_mode: "--onefile"
            run_cmd: "./sb3-bulk-downloader-windows.exe"
            artifact_path: "sb3-bulk-downloader-windows.exe"
            icon_arg: "--windows-icon-from-ico=assets/icon.ico"
          - os: macos-latest
            os_name: macos
            exe_ext: ""
            nuitka_mode: "--mode=app"
            run_cmd: "sb3-bulk-downloader-macos"
            artifact_path: "sb3-bulk-downloader-macos.app"
            icon_arg: "--macos-app-icon=assets/icon.icns"
    
    steps:
    


    
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Disable Windows Defender real-time monitoring
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true
          Add-MpPreference -ExclusionPath "${{ github.workspace }}"

      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: .nuitka-cache
          key: ${{ runner.os }}-nuitka-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nuitka-
            
      - name: Cache ccache
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: ccache-${{ runner.os }}-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install zstandard "nuitka[onefile]" pyautogui pillow requests scratchattach flet[all] imageio

      - name: Generate OS-specific App Icons
        run: |
          python -c "from PIL import Image; import sys; img = Image.open('assets/logo.png'); img.save('assets/icon.ico', format='ICO', sizes=[(256, 256)]) if sys.platform == 'win32' else img.save('assets/icon.icns', format='ICNS') if sys.platform == 'darwin' else img.save('assets/icon.png')"

      - name: Install Linux-specific packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb scrot patchelf ccache \
            libgtk-3-dev libglib2.0-dev \
            libgles2 libegl1 libgl1 libgbm1 \
            libsecret-1-dev libjsoncpp-dev \
            libx11-6 libxext-dev libxrender-dev libxrandr-dev \
            xfce4 xfce4-terminal gnome-screenshot dbus-x11 at-spi2-core

      - name: Compile with Nuitka
        shell: bash
        env:
          NUITKA_CACHE_DIR: ${{ github.workspace }}/.nuitka-cache
        run: |
          EXTRA_FLAGS=""
          if [ "$RUNNER_OS" = "Linux" ]; then
            EXTRA_FLAGS="--include-data-file=/usr/lib/x86_64-linux-gnu/libsecret-1.so.0=libsecret-1.so.0"
          fi
          python -m nuitka --assume-yes-for-downloads --jobs=4 \
            ${{ matrix.nuitka_mode }} ${{ matrix.icon_arg }} \
            --include-data-dir=assets=assets \
            --include-package-data=flet \
            --include-package-data=flet_desktop \
            --include-module=flet_desktop \
            --include-package-data=certifi \
            $EXTRA_FLAGS \
            --output-filename=sb3-bulk-downloader-${{ matrix.os_name }}${{ matrix.exe_ext }} \
            gui.py
                

          
          

          

      - name: Create Screenshot Runner Script
        shell: bash
        run: |
          cat << 'EOF' > runner.py
          import subprocess, time, pyautogui, sys, os
          import shlex
          import glob
          import plistlib
          
          cmd = sys.argv[1]
          if sys.platform == "darwin":
              app_bundles = glob.glob("*.app")
              if app_bundles:
                  app_bundle = app_bundles[0]
                  plist_path = os.path.join(app_bundle, 'Contents', 'Info.plist')
                  with open(plist_path, 'rb') as f:
                      plist = plistlib.load(f)
                  exe_name = plist.get('CFBundleExecutable')
                  cmd = './' + os.path.join(app_bundle, 'Contents', 'MacOS', exe_name)
              else:
                  print("No .app bundle found!")
                  sys.exit(1)
          
          print(f"Launching {cmd}...")
          
          p = subprocess.Popen([cmd])
          
          time.sleep(40)
          
          if sys.platform == "darwin":
            print("mac sucks")
            subprocess.run(['screencapture', '-x', 'macos-latest.png'])
          else: 
            pyautogui.screenshot('${{ matrix.os }}.png')
            
          p.terminate()
          EOF
          
      - name: Run App & Capture Screen (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          NO_AT_BRIDGE: "1"
        run: |
          xvfb-run --auto-servernum bash -c "export NO_AT_BRIDGE=1; dbus-launch startxfce4 & sleep 10 && python runner.py '${{ matrix.run_cmd }}'"

      - name: Run App & Capture Screen (Windows/Mac)
        if: runner.os != 'Linux'
        shell: bash
        run: python runner.py "${{ matrix.run_cmd }}"

      - uses: actions/upload-artifact@v4
        with:
          name: screenshot-${{ matrix.os }}
          path: ${{ matrix.os }}.png

  comment:
    runs-on: ubuntu-latest
    needs: screenshot
    permissions:
      contents: write
      pull-requests: write
  
    steps:
      - uses: actions/checkout@v4
  
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/screenshots
          pattern: screenshot-*
          merge-multiple: true
  
      # Push screenshots to a dedicated branch — never the PR branch
      - name: Publish screenshots to dedicated branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
  
          if git fetch origin screenshots 2>/dev/null; then
            git checkout -B screenshots FETCH_HEAD
          else
            git checkout --orphan screenshots
            git rm -rf . --quiet || true
          fi
  
          mkdir -p pr-${{ github.event.pull_request.number }}
          cp /tmp/screenshots/*.png pr-${{ github.event.pull_request.number }}/
          git add pr-${{ github.event.pull_request.number }}
          git diff --staged --quiet || git commit -m "screenshots: PR #${{ github.event.pull_request.number }} [skip ci]"
          git push origin HEAD:refs/heads/screenshots
  
      - uses: peter-evans/find-comment@v3
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: 'Screenshots Table'
  
      - uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            ### Screenshots Table
  
            | OS | Screenshot |
            |----|------------|
            | <img width="12" height="12" alt="Ubuntu Logo" src="https://github.com/user-attachments/assets/f61ac63e-1fc8-4577-9fb1-736d921b81a2" /> Ubuntu | <img src="https://raw.githubusercontent.com/${{ github.repository }}/screenshots/pr-${{ github.event.pull_request.number }}/ubuntu-latest.png" width="700" /> |
            | <img width="12" height="12" alt="Windows Logo" src="https://github.com/user-attachments/assets/4da4c060-732a-4aaf-b080-6b8de0600c71" /> Windows | <img src="https://raw.githubusercontent.com/${{ github.repository }}/screenshots/pr-${{ github.event.pull_request.number }}/windows-latest.png" width="700" /> |
            | <img width="12" height="12" alt="Apple Logo" src="https://github.com/user-attachments/assets/636ee068-b7a7-489d-a545-a616534900ed" /> MacOS | <img src="https://raw.githubusercontent.com/${{ github.repository }}/screenshots/pr-${{ github.event.pull_request.number }}/macos-latest.png" width="700" /> |
