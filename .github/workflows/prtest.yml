name: GUI Screenshot Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  screenshot:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - run: |
          python -m pip install --upgrade pip
          pip install pyautogui pillow

      - if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb scrot python3-tk python3-dev gnome-screenshot

      - shell: bash
        run: |
          cat << 'EOF' > runner.py
          import subprocess, time, pyautogui, sys, os
          p = subprocess.Popen([sys.executable, 'gui.py'])
          time.sleep(20)
          if sys.platform == "darwin":
            print("mac sucks")
            subprocess.run(['screencapture', '-x', 'macos-latest.png'])
          else: 
            pyautogui.screenshot('${{ matrix.os }}.png')
          p.terminate()
          EOF
          
          if [ "$RUNNER_OS" == "Linux" ]; then
            xvfb-run --auto-servernum python runner.py
          else
            python runner.py
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: screenshot-${{ matrix.os }}
          path: ${{ matrix.os }}.png

  comment:
    runs-on: ubuntu-latest
    needs: screenshot
    permissions:
      contents: write
      pull-requests: write
      
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: actions/download-artifact@v4
        with:
          path: .screenshots
          pattern: screenshot-*
          merge-multiple: true

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update gui screenshots [skip ci]"
          file_pattern: '.screenshots/*.png'

      - uses: peter-evans/find-comment@v3
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: 'Screenshots Table'

      - uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            ### Screenshots Table

            | OS | Screenshot |
            |----|------------|
            | <img width="12" height="12" alt="Ubuntu Logo" src="https://github.com/user-attachments/assets/f61ac63e-1fc8-4577-9fb1-736d921b81a2" /> Ubuntu | <img src="https://raw.githubusercontent.com/${{ github.repository }}/${{ github.event.pull_request.head.ref }}/.screenshots/ubuntu-latest.png" width="700" /> |
            | <img width="12" height="12" alt="Windows Logo" src="https://github.com/user-attachments/assets/4da4c060-732a-4aaf-b080-6b8de0600c71" /> Windows | <img src="https://raw.githubusercontent.com/${{ github.repository }}/${{ github.event.pull_request.head.ref }}/.screenshots/windows-latest.png" width="700" /> |
            | <img width="12" height="12" alt="Apple Logo" src="https://github.com/user-attachments/assets/636ee068-b7a7-489d-a545-a616534900ed"/> MacOS | <img src="https://raw.githubusercontent.com/${{ github.repository }}/${{ github.event.pull_request.head.ref }}/.screenshots/macos-latest.png" width="700" /> |
