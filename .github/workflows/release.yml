name: Interactive Issue Release

on:
  issues:
    types: [opened]

# Only run if the issue title starts with "New Release"
jobs:
  # ─────────────────────────────────────────────────────────────────
  # 1. BUILD & SCREENSHOT
  # ─────────────────────────────────────────────────────────────────
  build-and-screenshot:
    if: startsWith(github.event.issue.title, 'New Release')
    name: Build & Screen (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            os_name: linux
            exe_ext: ""
          - os: windows-latest
            os_name: windows
            exe_ext: ".exe"
          - os: macos-latest
            os_name: macos
            exe_ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Build & OS Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka customtkinter requests scratchattach Pillow pyautogui

      - name: Install Linux-specific packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb scrot python3-tk python3-dev gnome-screenshot patchelf ccache

      - name: Compile with Nuitka
        run: |
          python -m nuitka --onefile --enable-plugin=tk-inter --include-data-dir=assets=assets --output-filename=sb3-bulk-downloader-${{ matrix.os_name }}${{ matrix.exe_ext }} gui.py

      - name: Create Screenshot Runner Script
        shell: bash
        run: |
          cat << 'EOF' > runner.py
          import subprocess, time, pyautogui, sys, os
          
          exe_path = sys.argv[1]
          print(f"Launching {exe_path}...")
          p = subprocess.Popen([exe_path])
           
          time.sleep(40)
          
          if sys.platform == "darwin":
              print("mac sucks")
              subprocess.run(['screencapture', '-x', '${{ matrix.os }}.png'])
          else: 
              pyautogui.screenshot('${{ matrix.os }}.png')
              
          p.terminate()
          EOF

      - name: Run App & Capture Screen (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: xvfb-run --auto-servernum python runner.py ./sb3-bulk-downloader-linux

      - name: Run App & Capture Screen (Windows/Mac)
        if: runner.os != 'Linux'
        shell: bash
        run: python runner.py ./sb3-bulk-downloader-${{ matrix.os_name }}${{ matrix.exe_ext }}

      - name: Upload Executable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os_name }}
          path: sb3-bulk-downloader-${{ matrix.os_name }}${{ matrix.exe_ext }}

      - name: Upload Screenshot Artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-${{ matrix.os }}
          path: ${{ matrix.os }}.png


  # ─────────────────────────────────────────────────────────────────
  # 2. POST PREVIEW COMMENT & POLL FOR APPROVAL
  # ─────────────────────────────────────────────────────────────────
  interactive-approval:
    needs: build-and-screenshot
    name: Request Approval in Issue
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    timeout-minutes: 60 
    outputs:
      decision: ${{ steps.poll.outputs.decision }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Determine Version Tag
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="${{ github.event.issue.title }}"
          # Try to find vX.Y.Z in the title
          TAG=$(echo "$TITLE" | grep -oP 'v\d+\.\d+\.\d+' || echo "")
          
          if [ -z "$TAG" ]; then
            echo "No version found in title. Fetching latest release to auto-increment..."
            LATEST=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "v0.0.0")
            # If no releases exist, start at v1.0.0
            if [ "$LATEST" == "v0.0.0" ] || [ -z "$LATEST" ]; then
              TAG="v1.0.0"
            else
              # Strip 'v' and increment patch
              VERSION_PART="${LATEST#v}"
              MAJOR=$(echo "$VERSION_PART" | cut -d. -f1)
              MINOR=$(echo "$VERSION_PART" | cut -d. -f2)
              PATCH=$(echo "$VERSION_PART" | cut -d. -f3)
              NEW_PATCH=$((PATCH + 1))
              TAG="v$MAJOR.$MINOR.$NEW_PATCH"
            fi
          fi
          
          echo "Final Version Tag: $TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Download Screenshots
        uses: actions/download-artifact@v4
        with:
          pattern: screenshot-*
          path: /tmp/screenshots
          merge-multiple: true

      - name: Publish screenshots to dedicated branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if git fetch origin screenshots 2>/dev/null; then
            git checkout screenshots
          else
            git checkout --orphan screenshots
            git rm -rf . --quiet || true
          fi
          
          mkdir -p issue-${{ github.event.issue.number }}
          cp /tmp/screenshots/*.png issue-${{ github.event.issue.number }}/
          git add issue-${{ github.event.issue.number }}
          git diff --staged --quiet || git commit -m "screenshots: Issue #${{ github.event.issue.number }} [skip ci]"
          git push origin screenshots

      - name: Post Comment & Wait for Checkbox
        id: poll
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          BODY: ${{ github.event.issue.body }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          BASE_URL="https://raw.githubusercontent.com/$REPO/screenshots/issue-$ISSUE_NUM"
          
          printf '%s' "$BODY" > /tmp/issue-body.md
          
          cat <<EOF > /tmp/comment.md
          🤖 **Build Complete! Nuitka compilation was successful across all 3 platforms.**
          
          ### Screenshots Table
          
          | OS | Screenshot |
          |----|------------|
          | <img width="12" height="12" alt="Ubuntu Logo" src="https://github.com/user-attachments/assets/f61ac63e-1fc8-4577-9fb1-736d921b81a2" /> Ubuntu | <img src="$BASE_URL/ubuntu-latest.png" width="700" /> |
          | <img width="12" height="12" alt="Windows Logo" src="https://github.com/user-attachments/assets/4da4c060-732a-4aaf-b080-6b8de0600c71" /> Windows | <img src="$BASE_URL/windows-latest.png" width="700" /> |
          | <img width="12" height="12" alt="Apple Logo" src="https://github.com/user-attachments/assets/636ee068-b7a7-489d-a545-a616534900ed" /> MacOS | <img src="$BASE_URL/macos-latest.png" width="700" /> |
          
          ### 📝 Release Details Preview
          **Target Version:** \`$TAG\`
          **Release Notes:**
          EOF
          
          # Indent issue body as blockquote
          sed 's/^/> /' /tmp/issue-body.md >> /tmp/comment.md
          
          cat <<EOF >> /tmp/comment.md
          
          ---
          ### 🛑 Approval Required
          Check one of the boxes below to proceed. (The workflow is actively polling this comment).
          
          - [ ] **Cancel** (Aborts the release)
          - [ ] **Continue with release** (Publishes binaries and closes this issue)
          EOF
          
          COMMENT_ID=$(gh api repos/$REPO/issues/$ISSUE_NUM/comments -F body=@/tmp/comment.md --jq '.id')
          echo "Posted interactive comment ID: $COMMENT_ID"
          
          echo "Polling for user input every 15 seconds..."
          while true; do
            CURRENT_BODY=$(gh api repos/$REPO/issues/comments/$COMMENT_ID --jq '.body')
            
            # Check for both [x] and [X] to be safe
            if echo "$CURRENT_BODY" | grep -qE "\[[xX]\] \*\*Cancel\*\*"; then
              echo "User canceled the release."
              gh issue comment $ISSUE_NUM --body "🛑 Release process was cancelled by the user. Workflow terminated."
              exit 1
            fi
            
            if echo "$CURRENT_BODY" | grep -qE "\[[xX]\] \*\*Continue with release\*\*"; then
              echo "User approved the release!"
              break
            fi
            
            sleep 15
          done

  # ─────────────────────────────────────────────────────────────────
  # 3. PUBLISH GITHUB RELEASE
  # ─────────────────────────────────────────────────────────────────
  publish-release:
    needs: interactive-approval
    name: Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.interactive-approval.outputs.tag }}
          NOTES: ${{ github.event.issue.body }}
        run: |
          printf '%s' "$NOTES" > release-notes.md
          
          git tag -a "$TAG" -m "Release $TAG" || true
          git push origin "$TAG" || true
          
          gh release create "$TAG" \
            sb3-bulk-downloader-windows.exe \
            sb3-bulk-downloader-linux \
            sb3-bulk-downloader-macos \
            --title "sb3-bulk-downloader $TAG" \
            --notes-file release-notes.md
            
      - name: Close Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          gh issue comment $ISSUE_NUM --body "✅ **Release Published Successfully!** Closing this ticket."
          gh issue close $ISSUE_NUM --reason completed